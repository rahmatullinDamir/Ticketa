version: "3.9"

services:
  # --- ИНФРАСТРУКТУРА ---

  discovery-service:
    build: ./discovery-service
    container_name: ticketa-discovery
    ports:
      - "8761:8761"
    networks:
      - ticketa-network

  postgres:
    image: postgres:16
    container_name: ticketa-postgres
    restart: always
    environment:
      POSTGRES_DB: ticketa
      POSTGRES_USER: ticketa
      POSTGRES_PASSWORD: ticketa123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ticketa-network

  mongodb:
    image: mongo:7
    container_name: ticketa-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - ticketa-network

  redis:
    image: redis:7
    container_name: ticketa-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - ticketa-network

  # --- API GATEWAY ---

  api-gateway:
    build: ./api-gateway
    container_name: ticketa-api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      - discovery-service
      - redis
    networks:
      - ticketa-network

  # --- МИКРОСЕРВИСЫ ---

  auth-service:
    build: ./auth-service
    container_name: ticketa-auth-service
    env_file:
      - ./auth-service/local.env
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ticketa
    ports:
      - "8081:8081"
    depends_on:
      - discovery-service
      - postgres
      - redis
    networks:
      - ticketa-network

  event-catalog-service:
    build: ./event-catalog-service
    container_name: ticketa-event-catalog
    env_file:
      - ./event-catalog-service/local.env
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/ticketa
    ports:
      - "8082:8082"
    depends_on:
      - discovery-service
      - mongodb
    networks:
      - ticketa-network

  booking-service:
    build: ./booking-service
    container_name: ticketa-booking
    env_file:
      - ./booking-service/local.env
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ticketa
    ports:
      - "8083:8083"
    depends_on:
      - discovery-service
      - postgres
    networks:
      - ticketa-network

  notification-ticket-service:
    build: ./notification-ticket-service
    container_name: ticketa-notification
    env_file:
      - ./notification-ticket-service/local.env
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    ports:
      - "8084:8084"
    depends_on:
      - discovery-service
      - postgres
    networks:
      - ticketa-network

networks:
  ticketa-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data: