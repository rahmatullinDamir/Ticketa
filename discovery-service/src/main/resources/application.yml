server:
  port: 8761

spring:
  application:
    name: discovery-service

eureka:
  instance:
    hostname: ticketa-discovery
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always